global:
  scrape_interval: 15s

scrape_configs:

  # Prometheus 자기 자신
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # ✅ Spring Boot MySQL backend
  - job_name: "backend"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

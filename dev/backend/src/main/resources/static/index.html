<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 홈페이지</title>

<style>
/* ===== 기본 ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    color: #222;
}

/* ===== 헤더 ===== */
header {
    background: #1e66ff;
    color: white;
    padding: 20px;
    text-align: center;
}

nav ul {
    display: flex;
    justify-content: center;
    gap: 20px;
    list-style: none;
    margin-top: 10px;
}

nav a {
    color: white;
    text-decoration: none;
}

/* ===== 히어로 ===== */
.hero {
    text-align: center;
    padding: 40px;
}

/* ===== 버튼 ===== */
.btn {
    padding: 10px 16px;
    background: #1e66ff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* ===== 탭 버튼 ===== */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
}

.tab-btn {
    padding: 10px 16px;
    border: none;
    background: #ddd;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.tab-btn.active {
    background: #1e66ff;
    color: white;
}

/* ===== 탭 콘텐츠 ===== */
.tab-content {
    display: none;
    max-width: 800px;
    margin: 20px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.05);

    animation: fadeIn 0.3s ease;
}

.tab-content.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== 🔥 애니메이션 박스 ===== */
.box-container {
    display: flex;
    justify-content: center;
    margin: 40px 0;
}

.box {
    width: 120px;
    height: 120px;
    background: #1e66ff;
    border-radius: 12px;
    cursor: pointer;

    transform: translateY(0) scale(1);

    transition: transform 0.3s ease,
                box-shadow 0.3s ease,
                background 0.3s ease,
                opacity 0.3s ease;
}

/* hover */
.box:hover {
    transform: translateY(-10px) scale(1.05);
    opacity: 0.85;
}

/* 클릭 상태 */
.box.active {
    transform: translateY(0) scale(1.6);
    background: #0b3d91;
    box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    opacity: 1;
}

/* 클릭 순간 */
.box.clicked {
    animation: pop 0.25s ease;
}

@keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.8); }
    100% { transform: scale(1.6); }
}

/* ===== 푸터 ===== */
footer {
    text-align: center;
    padding: 30px;
    color: #777;
}
</style>

<script>
function showAlert() {
    alert('버튼 클릭!');
}

/* 탭 기능 */
function showTab(tabId, event) {
    document.querySelectorAll('.tab-content').forEach(el => {
        el.classList.remove('active');
    });

    document.getElementById(tabId).classList.add('active');

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    event.currentTarget.classList.add('active');
}

/* 박스 클릭 */
function handleClick(el) {
    el.classList.toggle("active");

    el.classList.add("clicked");

    setTimeout(() => {
        el.classList.remove("clicked");
    }, 250);
}
</script>

</head>

<body>

<header>
    <h1>내 홈페이지</h1>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Service</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h2>안녕하세요 👋</h2>
    <p>탭 + 애니메이션 UI 통합 예제</p>
    <button class="btn" onclick="showAlert()">클릭</button>
</section>

<!-- 🔥 애니메이션 박스 -->
<div class="box-container">
    <div class="box" onclick="handleClick(this)"></div>
</div>

<!-- 탭 버튼 -->
<div class="tabs">
    <button class="tab-btn active" onclick="showTab('about', event)">About</button>
    <button class="tab-btn" onclick="showTab('services', event)">Service</button>
    <button class="tab-btn" onclick="showTab('contact', event)">Contact</button>
</div>

<!-- 탭 콘텐츠 -->
<section id="about" class="tab-content active">
    <h2>About</h2>
    <p>소개 내용</p>
</section>

<section id="services" class="tab-content">
    <h2>Services</h2>
    <p>웹 제작 / 디자인 / 개발</p>
</section>

<section id="contact" class="tab-content">
    <h2>Contact</h2>
    <p>📧 email@example.com</p>
</section>

<footer>
    © 2026 내 홈페이지
</footer>

</body>
</html>

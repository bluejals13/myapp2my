

services:

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"  # Nginx는 외부 포트 80을 그대로 사용
    depends_on:
      - backend
    networks:
      - app-net


  backend:
    container_name: backend
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_MYSQL_URL}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - app-net
    restart: unless-stopped


  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: eventdb
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-net
    restart: unless-stopped


  redis:
    image: redis:7
    networks:
      - app-net


  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-net


  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - app-net


volumes:
  mysql_data:

networks:
  app-net:
    driver: bridge




